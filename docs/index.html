<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIM Sync Docs</title>
<style>
  :root {
    --bg: #fff;
    --bg-surface: #f6f8fa;
    --bg-code: #f0f2f5;
    --text: #1a1a1a;
    --text-secondary: #555;
    --text-muted: #888;
    --border: #d1d5db;
    --accent: #1a73e8;
    --accent-hover: #1557b0;
    --pass: #16a34a;
    --fail: #dc2626;
    --warn: #ca8a04;
    --info: #2563eb;
    --radius: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --bg-surface: #161b22;
      --bg-code: #1c2128;
      --text: #e6edf3;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --border: #30363d;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  #app { display: flex; min-height: 100vh; }

  /* Sidebar */
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  #sidebar h2 {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    padding: 0 20px;
    margin-bottom: 12px;
  }
  .doc-list { list-style: none; margin-bottom: 24px; }
  .doc-list li a {
    display: block;
    padding: 8px 20px;
    font-size: 14px;
    color: var(--text-secondary);
    text-decoration: none;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .doc-list li a:hover { color: var(--text); background: var(--bg); }
  .doc-list li a.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--bg);
    font-weight: 600;
  }
  #toc { list-style: none; }
  #toc li a {
    display: block;
    padding: 4px 20px;
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #toc li a:hover { color: var(--text); }
  #toc li.depth-3 a { padding-left: 36px; font-size: 12px; }

  /* Main content */
  #main {
    flex: 1;
    max-width: 900px;
    padding: 40px 48px;
    min-width: 0;
  }

  /* Markdown rendering */
  #content h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px; border-bottom: 2px solid var(--border); padding-bottom: 12px; }
  #content h2 { font-size: 22px; font-weight: 700; margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  #content h3 { font-size: 17px; font-weight: 600; margin: 28px 0 12px; }
  #content h4 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; }
  #content p { margin: 0 0 12px; font-size: 15px; }
  #content blockquote {
    border-left: 4px solid var(--accent);
    padding: 12px 16px;
    margin: 16px 0;
    background: var(--bg-surface);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 14px;
    color: var(--text-secondary);
  }
  #content blockquote p { margin: 0; }
  #content ul, #content ol { margin: 0 0 12px 24px; font-size: 15px; }
  #content li { margin: 4px 0; }
  #content a { color: var(--accent); text-decoration: none; }
  #content a:hover { text-decoration: underline; }
  #content strong { font-weight: 600; }
  #content code {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    background: var(--bg-code);
    padding: 2px 6px;
    border-radius: 4px;
  }
  #content pre {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    overflow-x: auto;
    margin: 12px 0 16px;
    font-size: 13px;
    line-height: 1.5;
  }
  #content pre code { background: none; padding: 0; }
  #content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

  /* Tables */
  #content table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0 20px;
    font-size: 14px;
  }
  #content th {
    text-align: left;
    font-weight: 600;
    padding: 10px 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    font-size: 13px;
    white-space: nowrap;
  }
  #content td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    vertical-align: top;
  }
  #content tr:hover td { background: var(--bg-surface); }

  /* Strikethrough for done items */
  #content del { color: var(--text-muted); }

  /* Test harness panel */
  #test-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-surface);
    border-top: 2px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 100;
    font-size: 14px;
    transition: transform 0.3s;
  }
  #test-panel.collapsed { transform: translateY(calc(100% - 40px)); }
  #test-panel .toggle {
    position: absolute;
    top: -28px;
    right: 24px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-bottom: none;
    padding: 4px 12px;
    border-radius: var(--radius) var(--radius) 0 0;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
  }
  .badge-pass { background: #dcfce7; color: var(--pass); }
  .badge-fail { background: #fee2e2; color: var(--fail); }
  .badge-warn { background: #fef3c7; color: var(--warn); }
  .badge-info { background: #dbeafe; color: var(--info); }
  @media (prefers-color-scheme: dark) {
    .badge-pass { background: #052e16; }
    .badge-fail { background: #450a0a; }
    .badge-warn { background: #422006; }
    .badge-info { background: #172554; }
  }
  .stat { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
  .stat-val { font-size: 24px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  #test-results {
    flex: 1;
    display: flex;
    gap: 12px;
    align-items: center;
    overflow-x: auto;
  }
  #run-tests {
    padding: 8px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  #run-tests:hover { background: var(--accent-hover); }
  #detail-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #detail-modal.open { display: flex; }
  #detail-content {
    background: var(--bg);
    border-radius: var(--radius);
    width: 90%;
    max-width: 800px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px;
    border: 1px solid var(--border);
  }
  #detail-content h3 { margin: 0 0 16px; font-size: 18px; }
  #detail-content table { font-size: 13px; }
  #detail-content .close-btn {
    float: right;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px 12px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13px;
  }

  /* Print */
  @media print {
    #sidebar, #test-panel, #detail-modal { display: none !important; }
    #main { padding: 20px; max-width: 100%; }
  }

  /* Responsive */
  @media (max-width: 900px) {
    #sidebar { display: none; }
    #main { padding: 24px 16px; }
  }
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <h2>Documents</h2>
    <ul class="doc-list" id="doc-list"></ul>
    <h2>Sections</h2>
    <ul id="toc"></ul>
  </nav>
  <main id="main">
    <div id="content"></div>
  </main>
</div>

<div id="test-panel">
  <button class="toggle" id="panel-toggle">Test Harness</button>
  <button id="run-tests">Run Spec Audit</button>
  <div id="test-results"></div>
</div>

<div id="detail-modal">
  <div id="detail-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const DOCS = [
  { file: '../FUNCTIONAL-SPEC.md', label: 'Webflow Extension Spec' },
  { file: 'SHOPIFY-APP-SPEC.md', label: 'PIM Sync Shopify App Spec' },
  { file: 'AUDIT-RESULTS.md', label: 'Audit Results' },
];

let currentDoc = null;
let currentMarkdown = '';

function buildDocList() {
  const ul = document.getElementById('doc-list');
  ul.innerHTML = DOCS.map(d =>
    `<li><a href="#" data-file="${d.file}" class="${d.file === DOCS[0].file ? 'active' : ''}">${d.label}</a></li>`
  ).join('');
  ul.addEventListener('click', e => {
    e.preventDefault();
    const a = e.target.closest('a[data-file]');
    if (a) loadDoc(a.dataset.file);
  });
}

async function loadDoc(file) {
  currentDoc = file;
  document.querySelectorAll('.doc-list a').forEach(a => {
    a.classList.toggle('active', a.dataset.file === file);
  });
  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error(`${res.status}`);
    currentMarkdown = await res.text();
    renderMarkdown(currentMarkdown);
  } catch (e) {
    document.getElementById('content').innerHTML = `<p style="color:var(--fail)">Failed to load ${file}: ${e.message}</p>`;
  }
}

function renderMarkdown(md) {
  const html = marked.parse(md, { gfm: true, breaks: false });
  document.getElementById('content').innerHTML = html;
  buildToc();
  window.scrollTo(0, 0);
}

function buildToc() {
  const headings = document.querySelectorAll('#content h2, #content h3');
  const toc = document.getElementById('toc');
  toc.innerHTML = '';
  headings.forEach((h, i) => {
    const id = 'sec-' + i;
    h.id = id;
    const depth = h.tagName === 'H3' ? 3 : 2;
    const li = document.createElement('li');
    li.className = `depth-${depth}`;
    li.innerHTML = `<a href="#${id}">${h.textContent}</a>`;
    toc.appendChild(li);
  });
}

// ── Test Harness ──

const SPEC_TESTS = [
  { id: 'S01', section: '1', name: 'Asset pipeline stages defined', test: md => /Ingest.*Normalize.*Mirror.*Transform.*Deliver.*Bind/s.test(md) },
  { id: 'S02', section: '1', name: 'Supported asset types listed', test: md => /\.glb.*\.usdz.*\.stl/s.test(md) },
  { id: 'S03', section: '1', name: 'Failure handling defined', test: md => /exponential backoff.*max 3 retries/si.test(md) },
  { id: 'S04', section: '2', name: 'ALT text model specified', test: md => /llama-3.*vision/i.test(md) || /Workers AI/i.test(md) },
  { id: 'S05', section: '2', name: 'Auto-tagging prompt defined', test: md => /List 3-5 product tags/i.test(md) },
  { id: 'S06', section: '2', name: 'Media type wrappers (img/video/model-viewer)', test: md => /model-viewer/i.test(md) && /\<video\>/i.test(md) },
  { id: 'S07', section: '3', name: 'ARIA roles for product card', test: md => /role="article".*aria-label/s.test(md) },
  { id: 'S08', section: '3', name: 'Keyboard navigation defined', test: md => /ArrowLeft.*ArrowRight/s.test(md) && /Escape/i.test(md) },
  { id: 'S09', section: '3', name: 'Focus trap in modal', test: md => /focus trap/i.test(md) },
  { id: 'S10', section: '3', name: 'Audit-before-insert enforcement', test: md => /Block insert.*prompt for ALT/si.test(md) },
  { id: 'S11', section: '4', name: 'Xano URL regex defined', test: md => /xano\.io\/api:/i.test(md) },
  { id: 'S12', section: '4', name: 'Shopify token regex defined', test: md => /shp\(at.*ua.*rt\)/s.test(md) || /shpat_/i.test(md) },
  { id: 'S13', section: '4', name: 'XSS prevention specified', test: md => /escapeHtml/i.test(md) },
  { id: 'S14', section: '4', name: 'Server-side re-validation', test: md => /server-side/i.test(md) && /re-validate/i.test(md) },
  { id: 'S15', section: '5', name: 'Gallery architecture diagram', test: md => /Main Image.*thumbnails/si.test(md) },
  { id: 'S16', section: '5', name: 'Variant-to-image mapping', test: md => /variant\.image_url.*find matching/si.test(md) },
  { id: 'S17', section: '5', name: 'CSS custom properties for slider', test: md => /--pim-gallery-main-size/i.test(md) },
  { id: 'S18', section: '5', name: 'Lazy loading on thumbnails', test: md => /loading="lazy"/i.test(md) },
  { id: 'S19', section: '6', name: 'Add to Cart checkout method', test: md => /checkoutCreate|Buy Button/si.test(md) },
  { id: 'S20', section: '6', name: 'Quick View focus trap + Escape', test: md => /Quick View.*Escape/si.test(md) },
  { id: 'S21', section: '6', name: 'Cart persistence in localStorage', test: md => /localStorage.*pim-cart/si.test(md) },
  { id: 'S22', section: '6', name: 'Embed code generation table', test: md => /Header CSS Variables.*Collection Grid.*PDP Variants/si.test(md) },
  { id: 'S23', section: '7', name: 'Tag normalize/dedup rules', test: md => /Normalize case.*Trim whitespace.*Deduplicate/si.test(md) },
  { id: 'S24', section: '7', name: 'Blocklist editor', test: md => /Blocklist editor/i.test(md) },
  { id: 'S25', section: '7', name: 'Max tag limits (250 tags, 255 chars)', test: md => /250 tags/i.test(md) && /255 char/i.test(md) },
  { id: 'S26', section: '8', name: '3-way mirror diagram', test: md => /Shopify.*Xano.*Webflow/si.test(md) },
  { id: 'S27', section: '8', name: 'Echo detection (KV + Xano)', test: md => /KV marker.*120s/si.test(md) || /echo detection/i.test(md) },
  { id: 'S28', section: '8', name: 'Conflict detection and resolution', test: md => /conflict.*Keep Shopify.*Keep Webflow/si.test(md) },
  { id: 'S29', section: '8', name: 'Cron schedule defined', test: md => /Every 6 hours|Daily at 02:00/si.test(md) },
  { id: 'S30', section: '8', name: 'Sync job logging schema', test: md => /sync_jobs.*job_type.*status.*started_at/si.test(md) },
  { id: 'S31', section: '9', name: 'No-delete guarantee', test: md => /never calls.*productDelete/si.test(md) || /No deletes/i.test(md) },
  { id: 'S32', section: '9', name: 'Draft-first for new products', test: md => /status: DRAFT/i.test(md) },
  { id: 'S33', section: '9', name: 'Pre-publish validation checks', test: md => /Handle collision.*Required fields.*Price sanity/si.test(md) },
  { id: 'S34', section: '9', name: 'Publish modes (preview/selective/incremental/full)', test: md => /Preview.*Selective.*Incremental.*Full/si.test(md) },
  { id: 'S35', section: '9', name: 'Rollback procedures defined', test: md => /Rollback.*translationsRegister.*original values/si.test(md) },
  { id: 'S36', section: '9', name: 'Extension writes Xano only (Shopify app owns mutations)', test: md => /Extension.*Xano.*Shopify app.*publish-sync/si.test(md) },
  { id: 'S37', section: '11', name: 'Data classification matrix', test: md => /Data Classification.*Product catalog.*Business data/si.test(md) },
  { id: 'S38', section: '11', name: 'No customer PII statement', test: md => /does not access.*customer personal data/si.test(md) },
  { id: 'S39', section: '11', name: 'GDPR articles mapped (Art. 5, 17, 25, 28, 30, 32)', test: md => /Art\. 5.*Art\. 17.*Art\. 25.*Art\. 28/si.test(md) },
  { id: 'S40', section: '11', name: 'CCPA compliance stated', test: md => /CCPA.*CPRA/si.test(md) },
  { id: 'S41', section: '11', name: 'Omnibus Directive price badge', test: md => /Lowest price in last 30 days/i.test(md) },
  { id: 'S42', section: '11', name: 'PCI DSS — no card data', test: md => /never handles.*payment card data/si.test(md) },
  { id: 'S43', section: '11', name: 'WCAG 2.2 AA declared', test: md => /WCAG 2\.2.*AA/i.test(md) },
  { id: 'S44', section: '11', name: 'AI disclosure policy', test: md => /AI-generated.*Accept.*Edit.*Reject/si.test(md) },
  { id: 'S45', section: '12', name: 'API group isolation documented', test: md => /api:Ksv9J-nS.*CRM tables.*180.*183/si.test(md) },
  { id: 'S46', section: '12', name: 'TLS 1.2 minimum', test: md => /TLS 1\.2/i.test(md) },
  { id: 'S47', section: '12', name: 'XSS mitigation via escapeHtml', test: md => /escapeHtml\(\).*DOM insertion/si.test(md) },
  { id: 'S48', section: '12', name: 'Path traversal prevention', test: md => /assets\/.*no.*\.\. sequences/si.test(md) },
  { id: 'S49', section: '12', name: 'SSRF prevention', test: md => /SSRF.*do not accept user-provided URLs/si.test(md) },
  { id: 'S50', section: '12', name: 'SVG sanitization rules', test: md => /strip.*script.*iframe.*foreignObject/si.test(md) },
  { id: 'S51', section: '12', name: 'CORS policy per endpoint', test: md => /Public data.*\*.*GET.*HEAD/si.test(md) },
  { id: 'S52', section: '12', name: 'Secrets rotation procedure', test: md => /Key rotation procedure/i.test(md) },
  { id: 'S53', section: '12', name: 'Rate limiting per API', test: md => /Shopify.*1000 cost.*Xano.*100 req/si.test(md) },
  { id: 'S54', section: '12', name: 'Incident response table', test: md => /Leaked API key.*Webhook spoofing.*XSS in embed/si.test(md) },
  { id: 'S55', section: '12', name: 'What is never logged', test: md => /never logged.*access tokens.*API keys/si.test(md) },
  { id: 'S56', section: 'meta', name: 'Standalone vs Paired modes defined', test: md => /Standalone.*Paired.*Xano tables only/si.test(md) },
  { id: 'S57', section: 'meta', name: 'Xano API group ID present', test: md => /api:Ksv9J-nS/i.test(md) },
  { id: 'S58', section: 'meta', name: 'Webflow App Client ID present', test: md => /f91764136187/i.test(md) },
];

function runTests() {
  if (!currentMarkdown) return;

  const results = SPEC_TESTS.map(t => ({
    ...t,
    passed: t.test(currentMarkdown)
  }));

  const passed = results.filter(r => r.passed).length;
  const failed = results.filter(r => !r.passed).length;
  const total = results.length;
  const pct = Math.round((passed / total) * 100);

  const container = document.getElementById('test-results');
  container.innerHTML = `
    <div class="stat">
      <span class="stat-val" style="color:var(--pass)">${passed}</span>
      <span class="stat-label">Pass</span>
    </div>
    <div class="stat">
      <span class="stat-val" style="color:${failed ? 'var(--fail)' : 'var(--text-muted)'}">${failed}</span>
      <span class="stat-label">Fail</span>
    </div>
    <div class="stat">
      <span class="stat-val">${total}</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat">
      <span class="stat-val" style="color:${pct === 100 ? 'var(--pass)' : 'var(--warn)'}">${pct}%</span>
      <span class="stat-label">Coverage</span>
    </div>
    <span class="badge ${pct === 100 ? 'badge-pass' : pct >= 90 ? 'badge-warn' : 'badge-fail'}">
      ${pct === 100 ? 'SPEC COMPLETE' : pct >= 90 ? 'NEAR COMPLETE' : 'GAPS FOUND'}
    </span>
    <a href="#" id="show-detail" style="font-size:13px;color:var(--accent);margin-left:auto;white-space:nowrap">View Details</a>
  `;

  document.getElementById('show-detail').addEventListener('click', e => {
    e.preventDefault();
    showDetailModal(results);
  });
}

function showDetailModal(results) {
  const sections = {};
  results.forEach(r => {
    if (!sections[r.section]) sections[r.section] = [];
    sections[r.section].push(r);
  });

  let html = '<button class="close-btn" onclick="document.getElementById(\'detail-modal\').classList.remove(\'open\')">Close</button>';
  html += '<h3>Spec Audit Results</h3>';

  for (const [sec, tests] of Object.entries(sections)) {
    const secPassed = tests.filter(t => t.passed).length;
    const secLabel = sec === 'meta' ? 'Meta / Structure' : `Section ${sec}`;
    html += `<h4 style="margin:16px 0 8px">${secLabel} <span class="badge ${secPassed === tests.length ? 'badge-pass' : 'badge-fail'}">${secPassed}/${tests.length}</span></h4>`;
    html += '<table><thead><tr><th>ID</th><th>Requirement</th><th>Status</th></tr></thead><tbody>';
    tests.forEach(t => {
      html += `<tr>
        <td>${t.id}</td>
        <td>${t.name}</td>
        <td><span class="badge ${t.passed ? 'badge-pass' : 'badge-fail'}">${t.passed ? 'PASS' : 'FAIL'}</span></td>
      </tr>`;
    });
    html += '</tbody></table>';
  }

  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail-modal').classList.add('open');
}

// Panel toggle
document.getElementById('panel-toggle').addEventListener('click', () => {
  document.getElementById('test-panel').classList.toggle('collapsed');
});

// Detail modal close on overlay click
document.getElementById('detail-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

document.getElementById('run-tests').addEventListener('click', runTests);

buildDocList();
loadDoc(DOCS[0].file);
</script>
</body>
</html>
